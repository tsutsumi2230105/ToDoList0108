<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoMVC: JavaScript Es6 Webpack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>todo</h1>
  </header>

  <div id="inputWrapper" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 40px;">
  <input type="text" id="text-input" placeholder="What needs to be done?">
  </div>
  <div id="displayArea"></div>
  <button id="checkAll">すべて完了にする</button>
  <button id="showAll">すべて表示</button>
  <button id="showChecked">完了だけ表示</button>
  <button id="showUnchecked">未完了だけ表示</button>
  <button id="deleteChecked">完了済みを削除</button>


  <p id="remainingCount">残りタスク：0</p>
  <p>Double-click to edit a todo</p>
  <p>Created by the TodoMVC Team</p>
  <p>Part of TodoMVC</p>

  <script src="script.js"></script>
</body>
</html>
