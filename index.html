<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoMVC: JavaScript Es6 Webpack</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>todos</h1>
  </header>

  <!-- 元のボタン -->
  <!-- <button id="checkAll">すべて完了/未完了</button> -->
  <!-- 画像に置き換え -->
<div id="forshadow">
  <div id="inputWrapper" style="display: flex; justify-content: center; align-items: center;">
    <div style="position: relative; width: 550px;">
    <img id="checkAll"  src="check-all.png" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width:24px; height:24px;">      
    <input type="text" id="text-input" placeholder="What needs to be done?" style="width: 100%; padding-left: 40px; height: 65px; "/>
    </div>
  </div>

  <!-- ここに displayArea を移動 -->
  <div id="displayArea"></div>

<div id="buttonWrapper">
  <p id="remainingCount">0 items left</p>

  <div id="filterButtons">
    <button id="showAll">All</button>
    <button id="showChecked">Active</button>
    <button id="showUnchecked">Completed</button>
  </div>

  <button id="deleteChecked">Clear Completed</button>
</div>
</div>
  <script src="script.js"></script>
</body>

<footer>
  <p>Double-click to edit a todo</p>
  <p>Created by the TodoMVC Team</p>
  <p>Part of <a href="https://todomvc.com/" target="_blank">TodoMVC</a></p> 
</footer>

</html>
